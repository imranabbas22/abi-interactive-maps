<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mastery Skills - ABI Builder</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#D4AF37;--accent:#C9A961;--bg:#0a0a0a;--surface:#141414;--elevated:#1c1c1c;--text:#ededed;--tsec:#9ca3af;--tmuted:#6b7280;--border:rgba(255,255,255,0.05);--glass:rgba(255,255,255,0.03);--l1:rgba(212,175,55,0.15);--l2:rgba(212,175,55,0.30);--l3:rgba(212,175,55,0.50)}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.glass{background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.text-gradient{background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.t-primary{color:var(--primary)}.t-sec{color:var(--tsec)}.t-muted{color:var(--tmuted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-weight:600;font-size:13px;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#000}
.btn-primary:hover{box-shadow:0 4px 20px rgba(212,175,55,0.3);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--tsec)}
.btn-outline:hover{border-color:rgba(212,175,55,0.3);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:7px}
.preset-btn.active{border-color:rgba(212,175,55,0.4);background:rgba(212,175,55,0.1);color:var(--primary)}
nav{position:fixed;top:0;left:0;right:0;z-index:50;height:64px}
.nav-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-links{display:flex;align-items:center;gap:24px}
.nav-link{color:var(--tsec);font-size:14px;font-weight:500;transition:color .2s}
.nav-link:hover{color:var(--primary)}
.nav-logo{font-weight:700;font-size:20px;display:flex;align-items:center;gap:8px}
main{padding-top:72px;padding-bottom:40px}

/* Hero */
.hero{text-align:center;padding:28px 24px 16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:rgba(212,175,55,0.06);border-radius:50%;filter:blur(120px);pointer-events:none}
.hero h1{font-size:36px;font-weight:800;margin-bottom:4px}
.hero p{color:var(--tsec);max-width:620px;margin:0 auto;font-size:14px;line-height:1.5}

/* Point tracker */
.point-tracker{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 24px;margin:14px auto 0;max-width:460px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px}
.point-ring{position:relative;width:60px;height:60px;flex-shrink:0}
.point-ring svg{transform:rotate(-90deg)}
.point-ring .bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:6}
.point-ring .fg{fill:none;stroke:url(#pg);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.point-ring .center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.point-info .label{font-size:10px;color:var(--tsec);text-transform:uppercase;letter-spacing:.5px}
.point-info .status{font-size:14px;font-weight:600}
.point-info .hint{font-size:11px;color:var(--tmuted)}

/* Presets */
.presets{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:12px auto;max-width:700px}
.preset-btn{padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--tsec);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}
.preset-btn:hover{border-color:rgba(212,175,55,0.3);color:var(--text);background:rgba(212,175,55,0.05)}
.preset-btn.active{border-color:rgba(212,175,55,0.4);background:rgba(212,175,55,0.1);color:var(--primary);box-shadow:0 0 12px rgba(212,175,55,0.15)}

/* ===== 3-column layout ===== */
.cat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:20px 24px;max-width:1400px;margin:0 auto}
.cat-col{min-width:0}
.cat-header{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cat-header span:last-child{font-size:11px;color:var(--tmuted);font-weight:400;margin-left:auto}

/* Compact skill cards — 2 columns x 3 rows per category */
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Card: vertical layout with large centered icon */
.skill-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:14px 12px 10px;transition:all .25s;cursor:default;text-align:center}
.skill-card:hover{border-color:rgba(212,175,55,0.18)}
.skill-card.invested{border-color:rgba(212,175,55,0.3);background:rgba(212,175,55,0.04)}
.skill-card .icon-wrap{width:72px;height:72px;border-radius:12px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;margin:0 auto 6px}
.skill-card .icon-wrap img{width:64px;height:64px;object-fit:contain}
.skill-card .info{text-align:center;margin-bottom:6px}
.skill-card h3{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-card .desc{font-size:10px;color:var(--tsec);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-card .bonus-tag{font-size:10px;padding:1px 8px;border-radius:4px;font-weight:600;display:inline-block;margin-top:2px}
.bonus-tag.l1{background:var(--l1);color:var(--primary)}
.bonus-tag.l2{background:var(--l2);color:var(--primary)}
.bonus-tag.l3{background:var(--l3);color:#000}

/* Dots row */
.level-dots{display:flex;align-items:center;gap:4px}
.dot{width:22px;height:22px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--tmuted)}
.dot:hover{border-color:rgba(212,175,55,0.3)}
.dot.filled-1{border-color:rgba(212,175,55,0.35);background:var(--l1);color:var(--primary)}
.dot.filled-2{border-color:rgba(212,175,55,0.45);background:var(--l2);color:var(--primary);font-weight:700}
.dot.filled-3{border-color:var(--primary);background:var(--l3);color:#000;font-weight:800}
.dot.active{border-color:var(--primary);box-shadow:0 0 8px rgba(212,175,55,0.25)}
.dot.disabled{opacity:0.25;cursor:not-allowed}
.clr-btn{background:none;border:none;color:var(--tmuted);cursor:pointer;font-size:10px;padding:0 3px;line-height:1;opacity:0;transition:opacity .2s}
.skill-card:hover .clr-btn{opacity:0.6}
.skill-card:hover .clr-btn:hover{opacity:1;color:#ff6b6b}

/* Comparison bar — always visible space reserved, shows base → bonus */
.comp-bar-wrap{margin-top:5px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.04);min-height:20px;height:20px}
.comp-bar-wrap .comp-row{display:flex;align-items:center;gap:4px;height:14px}
.comp-bar-wrap .comp-row .clbl{font-size:9px;color:var(--tmuted);width:22px;flex-shrink:0;text-align:right;font-weight:500}
.comp-bar-wrap .comp-row .cbar{flex:1;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;position:relative}
.comp-bar-wrap .comp-row .cbar .cfill{height:100%;border-radius:2px;width:0;transition:width .6s cubic-bezier(.22,1,.36,1)}
.comp-bar-wrap .comp-row .cbar .cfill.animate{width:var(--tw,100%)}
.cfill{background:linear-gradient(90deg,var(--primary),var(--accent))}
.comp-bar-wrap .comp-row .cval{font-size:9px;font-weight:600;width:36px;text-align:right;flex-shrink:0}
.comp-bar-wrap .comp-row .cval.base{color:var(--tmuted)}
.comp-bar-wrap .comp-row .cval.bonus{color:var(--primary)}

/* ===== SUMMARY PANEL — animated stats ===== */
.summary-panel{position:fixed;top:0;right:0;width:380px;height:100vh;background:rgba(10,10,10,0.97);backdrop-filter:blur(24px);border-left:1px solid var(--border);z-index:100;padding:24px 20px;overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.summary-panel.open{transform:translateX(0)}
.summary-panel h2{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

/* Stat bars in panel */
.stat-bars{padding:4px 0 8px}
.stat-bars .sbar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.stat-bars .sbar-row .sicon{width:20px;text-align:center;font-size:16px;flex-shrink:0}
.stat-bars .sbar-row .sinfo{flex:1}
.stat-bars .sbar-row .sinfo .slabel{font-size:11px;font-weight:500;display:flex;justify-content:space-between}
.stat-bars .sbar-row .sinfo .slabel .sval{font-weight:700;color:var(--primary)}
.stat-bars .sbar-row .strack{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;margin-top:3px;overflow:hidden}
.stat-bars .sbar-row .strack .sfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--accent));width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}

/* Skills invested list */
.invested-list{margin-top:8px}
.invested-list .ilabel{font-size:10px;color:var(--tsec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.iskill{display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(255,255,255,0.02);border-radius:6px;margin-bottom:3px;font-size:11px}
.iskill .iname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iskill .ibadge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0}
.iskill .ibadge.lv1{background:var(--l1);color:var(--primary)}
.iskill .ibadge.lv2{background:var(--l2);color:var(--primary)}
.iskill .ibadge.lv3{background:var(--l3);color:#000}

/* Toggle */
.toggle-summary{position:fixed;bottom:24px;right:24px;z-index:90;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#000;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 20px rgba(212,175,55,0.25);transition:all .2s;display:flex;align-items:center;justify-content:center}
.toggle-summary:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(212,175,55,0.35)}
.toggle-summary .badge{position:absolute;top:-3px;right:-3px;min-width:20px;height:20px;border-radius:10px;background:#ff4444;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px}

@media(max-width:1024px){.cat-row{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  .hero h1{font-size:24px}
  .cat-row{grid-template-columns:1fr;padding:12px}
  .skill-grid{grid-template-columns:1fr 1fr}
  .summary-panel{width:100vw}
  .nav-links{display:none}
  .point-tracker{flex-direction:row;padding:10px 16px}
}
</style>
</head>
<body>
<svg width="0" height="0"><defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#D4AF37"/><stop offset="1" stop-color="#C9A961"/></linearGradient></defs></svg>

<nav class="glass">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#pg)"/><path d="M16 6l10 6v8l-10 6-10-6v-8z" fill="#0a0a0a" stroke="#D4AF37" stroke-width="1.5"/><circle cx="16" cy="16" r="4" fill="#D4AF37"/></svg>
      ABI <span class="t-primary">Builder</span>
    </a>
    <div class="nav-links">
      <a href="https://abibuilder.com" class="nav-link">Home</a>
      <a href="https://abibuilder.com/builds" class="nav-link">Builds</a>
      <a href="https://abibuilder.com/randomizer" class="nav-link">Randomizer</a>
      <a href="https://abibuilder.com/guides" class="nav-link">Guides</a>
      <a href="#" class="nav-link" style="color:var(--primary);font-weight:600">Mastery Skills</a>
    </div>
  </div>
</nav>

<main>
  <section class="hero">
    <h1>Mastery <span class="text-gradient">Skills</span></h1>
    <p>You have <strong class="t-primary">12 skill points</strong> to distribute across 18 skills. Each upgraded up to 3 times.</p>

    <div class="point-tracker">
      <div class="point-ring">
        <svg width="60" height="60" viewBox="0 0 60 60">
          <circle class="bg" cx="30" cy="30" r="24"/>
          <circle class="fg" id="progressRing" cx="30" cy="30" r="24" stroke-dasharray="150.8" stroke-dashoffset="0"/>
        </svg>
        <div class="center"><span id="ptsUsed">0</span></div>
      </div>
      <div class="point-info">
        <div class="label">Skill Points</div>
        <div class="status"><span id="ptsDisplay">0</span> / 12 <span class="t-muted" id="ptsRemain" style="font-weight:400;font-size:12px">(12 left)</span></div>
        <div class="hint" id="ptsHint">Click 1 / 2 / 3 on any skill</div>
      </div>
    </div>

    <div class="presets" id="presetContainer"></div>
  </section>

  <div class="cat-row" id="catRow"></div>
</main>

<button class="toggle-summary" id="toggleSummary" onclick="togglePanel()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  <span class="badge" id="skillCount">0</span>
</button>
<div class="overlay" id="overlay" onclick="togglePanel()"></div>

<div class="summary-panel" id="summaryPanel">
  <div class="s-hdr">
    <h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Build Stats</h2>
    <button onclick="clearAll()" class="btn btn-outline btn-sm" style="font-size:10px;padding:4px 10px">Reset</button>
  </div>
  <div id="summaryContent"></div>
</div>

<script>
// ===== DATA =====
const S = [
  {n:'Sleight of Hand',c:'Combat',img:'image1.png',b:'3.0s reload',l:[{d:'2.5s reload',v:'2.5s'},{d:'2.0s reload',v:'2.0s'},{d:'1.5s reload',v:'1.5s'}]},
  {n:'Quick Seal',c:'Combat',img:'image2.png',b:'120s heal',l:[{d:'60s heal',v:'60s'},{d:'40s heal',v:'40s'},{d:'15s heal',v:'15s'}]},
  {n:'Veteran',c:'Combat',img:'image3.png',b:'Full sway when hit',l:[{d:'Sway -20%',v:'-20%'},{d:'Sway -40%',v:'-40%'},{d:'Sway -60%',v:'-60%'}]},
  {n:'Iron Arm',c:'Combat',img:'image4.png',b:'Normal upper stam',l:[{d:'Recovery +10%',v:'+10%'},{d:'Recovery +20%',v:'+20%'},{d:'Recovery +35%',v:'+35%'}]},
  {n:'Focus Puller',c:'Combat',img:'image5.png',b:'Normal lean speed',l:[{d:'Lean +15%',v:'+15%'},{d:'Lean +25%',v:'+25%'},{d:'Lean +40%',v:'+40%'}]},
  {n:'Jump Weapon Ctrl',c:'Combat',img:'image6.png',b:'Full jump spread',l:[{d:'Spread -20%',v:'-20%'},{d:'Spread -40%',v:'-40%'},{d:'Spread -60%',v:'-60%'}]},
  {n:'Battlefield Heal',c:'Survival',img:'image7.png',b:'Normal rescue',l:[{d:'Rescue +15%',v:'+15%'},{d:'Rescue +25%',v:'+25%'},{d:'Rescue +40%, heal parts',v:'+40%'}]},
  {n:'Parkour',c:'Survival',img:'image8.png',b:'100% fall dmg',l:[{d:'Fall -20%',v:'-20%'},{d:'Fall -40%',v:'-40%'},{d:'Fall -60%, hi jump',v:'-60%'}]},
  {n:'Stay Alive',c:'Survival',img:'image9.png',b:'Normal downed',l:[{d:'Move +10% HP+15%',v:'+10%'},{d:'Move +20% HP+30%',v:'+20%'},{d:'Move +30% HP+50%',v:'+30%'}]},
  {n:'Marathon',c:'Survival',img:'image10.png',b:'Normal low stam',l:[{d:'Stam +10%',v:'+10%'},{d:'Stam +20%',v:'+20%'},{d:'Stam +35%',v:'+35%'}]},
  {n:'Fire-Retardant',c:'Survival',img:'image11.png',b:'Full burn dmg',l:[{d:'Burn -10%',v:'-10%'},{d:'Burn -20%',v:'-20%'},{d:'Burn -40%',v:'-40%'}]},
  {n:'Emergency Evasion',c:'Survival',img:'image12.png',b:'No hit boost',l:[{d:'+15% 2s',v:'2s'},{d:'+20% 3s',v:'3s'},{d:'+25% 4s',v:'4s'}]},
  {n:'Porter',c:'Utility',img:'image13.png',b:'Base carry',l:[{d:'+2kg',v:'+2kg'},{d:'+5kg',v:'+5kg'},{d:'+10kg',v:'+10kg'}]},
  {n:'Pharmacist',c:'Utility',img:'image14.png',b:'Normal duration',l:[{d:'Duration +10%',v:'+10%'},{d:'Duration +20%',v:'+20%'},{d:'Duration +35%',v:'+35%'}]},
  {n:'Heavy Motor',c:'Utility',img:'image15.png',b:'Full armor penalty',l:[{d:'Penalty -10%',v:'-10%'},{d:'Penalty -20%',v:'-20%'},{d:'Penalty -35%',v:'-35%'}]},
  {n:'Effective Looting',c:'Utility',img:'image16.png',b:'Search all',l:[{d:'6% skip',v:'6%'},{d:'12% skip',v:'12%'},{d:'20% skip',v:'20%'}]},
  {n:"Vinson's Friend I",c:'Utility',img:'image17.png',b:'No weapon return',l:[{d:'3% retrieve',v:'3%'},{d:'6% retrieve',v:'6%'},{d:'10% retrieve',v:'10%'}]},
  {n:"Vinson's Friend II",c:'Utility',img:'image18.png',b:'No armor return',l:[{d:'3% retrieve',v:'3%'},{d:'6% retrieve',v:'6%'},{d:'10% retrieve',v:'10%'}]}
];
const CATS = ['Combat','Survival','Utility'];
const CICONS = {Combat:'⚔️',Survival:'🛡️',Utility:'🎒'};

const PRESETS = [
  {n:'Rat Master',d:'Stealth survival',p:{'Quick Seal':3,'Parkour':3,'Stay Alive':2,'Porter':2,'Emergency Evasion':2}},
  {n:'Spec Ops',d:'Tactical combat',p:{'Sleight of Hand':3,'Veteran':3,'Iron Arm':2,'Focus Puller':2,'Battlefield Heal':2}},
  {n:'Robin Hood',d:'Precision sniper',p:{'Focus Puller':3,'Veteran':3,'Marathon':3,'Parkour':2,'Jump Weapon Ctrl':1}},
  {n:'Loot Runner',d:'Economic farm',p:{'Porter':3,'Effective Looting':3,'Pharmacist':2,'Quick Seal':2,'Marathon':2}},
  {n:'Medics',d:'Squad support',p:{'Battlefield Heal':3,'Quick Seal':3,'Pharmacist':3,'Stay Alive':2,'Emergency Evasion':1}},
  {n:'Juggernaut',d:'Heavy assault',p:{'Heavy Motor':3,'Fire-Retardant':3,'Iron Arm':2,'Marathon':2,'Sleight of Hand':2}}
];

let A = {}, activePreset = null;
const MAX = 12;
function used(){return Object.values(A).reduce((a,b)=>a+b,0)}
function rem(){return MAX-used()}
function skillByName(n){return S.find(s=>s.n===n)}

// ===== RENDER =====
function r(){
  rCats(); rTracker(); rPresets(); rSummary();
}

function rCats(){
  const el = document.getElementById('catRow');
  el.innerHTML = CATS.map(cat => {
    const skills = S.filter(s => s.c === cat);
    return `<div class="cat-col">
      <div class="cat-header">${CICONS[cat]} ${cat} <span>${skills.length} skills</span></div>
      <div class="skill-grid">${skills.map(s => rCard(s)).join('')}</div>
    </div>`;
  }).join('');
  // Animate all level bars from width:0 → target
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.comp-bar-wrap .cfill[style*="--tw"]').forEach(bar => {
        bar.classList.add('animate');
      });
    });
  });
}

function rCard(s){
  const lvl = A[s.n]||0;
  return `<div class="skill-card ${lvl>0?'invested':''}">
      <div class="icon-wrap"><img src="/skill-icons/${s.img}" alt="${s.n}"></div>
      <div class="info"><h3 title="${s.n}">${s.n}</h3><div class="desc">${lvl>0?s.l[lvl-1].d:s.b}</div>${lvl>0?`<span class="bonus-tag l${lvl}">${s.l[lvl-1].v}</span>`:''}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:4px">
      <div class="level-dots">${[1,2,3].map(l => {
        const f = lvl >= l, can = rem()>0||lvl>=l;
        return `<button class="dot ${f?`filled-${l}`:''} ${l===lvl?'active':''} ${!can&&!f?'disabled':''}" onclick="setL('${s.n}',${l})" ${!can&&!f?'disabled':''}>${l}</button>`;
      }).join('')}</div>
      <button class="clr-btn" onclick="clearSk('${s.n}')" style="display:${lvl>0?'':'none'}">✕</button>
    </div>
    ${rCompBar(s, lvl)}
  </div>`;
}

function rCompBar(s, lvl){
  // Always rendered to reserve space — shows base (0pt) vs bonus (Lv.X)
  if (lvl === 0) {
    return `<div class="comp-bar-wrap"><div class="comp-row">
      <span class="clbl"></span>
      <div class="cbar"><div class="cfill" style="width:8%"></div></div>
      <span class="cval base">${s.b.replace(/^[^:]*/,'').trim()}</span>
    </div></div>`;
  }
  const pct = lvl === 1 ? 35 : lvl === 2 ? 65 : 100;
  const baseVal = s.b.replace(/^[^:]*:\s*/,'').trim();
  return `<div class="comp-bar-wrap"><div class="comp-row">
    <span class="clbl">Lv.${lvl}</span>
    <div class="cbar"><div class="cfill" style="--tw:${pct}%"></div></div>
    <span class="cval bonus">${s.l[lvl-1].v}</span>
  </div><div style="font-size:8px;color:var(--tmuted);line-height:1;margin-top:-1px;padding-left:22px">0pt: ${baseVal}</div></div>`;
}

function rTracker(){
  const u = used(), r = rem();
  document.getElementById('ptsUsed').textContent = u;
  document.getElementById('ptsDisplay').textContent = u;
  document.getElementById('ptsRemain').textContent = `(${r} left)`;
  document.getElementById('skillCount').textContent = Object.keys(A).filter(k=>A[k]>0).length;
  const circ = document.getElementById('progressRing');
  circ.setAttribute('stroke-dashoffset', 150.8 - (u/MAX)*150.8);
  document.getElementById('ptsHint').textContent = u===0?'Click 1 / 2 / 3 on any skill':r===0?'All points used! Click a lower level to free points':`${u} used · ${r} left`;
}

function rPresets(){
  document.getElementById('presetContainer').innerHTML = PRESETS.map(p =>
    `<button class="preset-btn ${activePreset===p.n?'active':''}" onclick="applyP('${p.n}')">${p.n}</button>`
  ).join('');
}

// ===== ANIMATED SUMMARY =====
function rSummary(){
  const u = used();
  const el = document.getElementById('summaryContent');
  if (u === 0) {
    el.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--tmuted);font-size:13px">No points allocated yet<br><span style="font-size:11px">Click the Lv.1-3 dots on skills above</span></div>`;
    return;
  }

  const stats = calcStats();
  const invested = S.filter(s => (A[s.n]||0) > 0);

  // Stat bars
  let html = `<div class="stat-bars">`;
  const defs = [
    {k:'combat',i:'⚡',l:'Combat Speed'},{k:'survive',i:'❤️',l:'Survivability'},
    {k:'mobility',i:'🏃',l:'Mobility'},{k:'looting',i:'💰',l:'Looting Power'},{k:'recovery',i:'🔄',l:'Raid Recovery'}
  ];
  defs.forEach(d => {
    const v = Math.min(stats[d.k], 100);
    html += `<div class="sbar-row">
      <div class="sicon">${d.i}</div>
      <div class="sinfo">
        <div class="slabel"><span>${d.l}</span><span class="sval">${v}%</span></div>
        <div class="strack"><div class="sfill" data-width="${v}" style="width:0"></div></div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Distribution
  const cCount = invested.filter(s=>s.c==='Combat').length;
  const sCount = invested.filter(s=>s.c==='Survival').length;
  const uCount = invested.filter(s=>s.c==='Utility').length;

  html += `<div style="display:flex;gap:6px;margin-bottom:12px">
    <div style="flex:1;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px;text-align:center;font-size:11px">
      <div class="t-primary" style="font-weight:700;font-size:16px">${u}</div>
      <div class="t-muted" style="font-size:9px">Points</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px;text-align:center;font-size:11px">
      <div class="t-primary" style="font-weight:700;font-size:16px">${invested.length}</div>
      <div class="t-muted" style="font-size:9px">Skills</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,0.02);border-radius:8px;padding:8px;text-align:center;font-size:10px">
      <div style="font-weight:600">⚔️${cCount}</div>
      <div style="font-weight:600">🛡️${sCount}</div>
      <div style="font-weight:600">🎒${uCount}</div>
      <div class="t-muted" style="font-size:8px">per cat</div>
    </div>
  </div>`;

  // Invested skills
  html += `<div class="invested-list"><div class="ilabel">Invested Skills (${invested.length})</div>`;
  invested.forEach(s => {
    const l = A[s.n];
    html += `<div class="iskill"><img src="/skill-icons/${s.img}" alt="" style="width:16px;height:16px;object-fit:contain;flex-shrink:0"><span class="iname">${s.n}</span><span class="ibadge lv${l}">Lv.${l} ${s.l[l-1].v}</span></div>`;
  });
  html += `</div>`;

  el.innerHTML = html;

  // Animate bars after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.sfill').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  });
}

function calcStats(){
  const a = {combat:0,survive:0,mobility:0,looting:0,recovery:0};
  for (const [name, lvl] of Object.entries(A)) {
    const l = lvl||0;
    switch(name){
      case 'Sleight of Hand': a.combat += l*12; break;
      case 'Quick Seal': a.survive += l*10; a.recovery += l*8; break;
      case 'Veteran': a.combat += l*8; a.survive += l*6; break;
      case 'Iron Arm': a.mobility += l*10; a.combat += l*4; break;
      case 'Focus Puller': a.combat += l*8; break;
      case 'Jump Weapon Ctrl': a.combat += l*6; break;
      case 'Battlefield Heal': a.survive += l*12; a.recovery += l*10; break;
      case 'Parkour': a.mobility += l*12; a.survive += l*4; break;
      case 'Stay Alive': a.survive += l*12; break;
      case 'Marathon': a.mobility += l*12; break;
      case 'Fire-Retardant': a.survive += l*8; break;
      case 'Emergency Evasion': a.mobility += l*8; a.survive += l*5; break;
      case 'Porter': a.looting += l*14; break;
      case 'Pharmacist': a.recovery += l*12; a.survive += l*6; break;
      case 'Heavy Motor': a.mobility += l*10; break;
      case 'Effective Looting': a.looting += l*14; break;
      case "Vinson's Friend I": a.recovery += l*10; break;
      case "Vinson's Friend II": a.recovery += l*10; break;
    }
  }
  return a;
}

// ===== ACTIONS =====
function setL(name, level){
  const cur = A[name]||0;
  if (level - cur > 0 && rem() < (level - cur)) return;
  A[name] = level;
  if (level === 0) delete A[name];
  activePreset = null; r();
}

function clearSk(name){ delete A[name]; activePreset=null; r(); }
function clearAll(){ A={}; activePreset=null; r(); }

function applyP(name){
  const p = PRESETS.find(x => x.n === name);
  if (!p) return;
  if (activePreset === name) { clearAll(); return; }
  A = {};
  for (const [sn, sl] of Object.entries(p.p)) {
    const match = S.find(s => s.n === sn);
    if (match) A[match.n] = sl;
  }
  activePreset = name; r();
}

function togglePanel(){
  document.getElementById('summaryPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
  rSummary(); // refresh on open to animate
}

r();
</script>
</body>
</html>
